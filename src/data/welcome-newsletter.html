<!doctype html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="color-scheme" content="light dark" />
		<meta name="supported-color-schemes" content="light dark" />
		<title>Newsletter confirmación - Femm tribu</title>
		<link href="https://fonts.googleapis.com/css2?family=Questrial&display=swap" rel="stylesheet" />
		<style>
			:root {
				color-scheme: light dark;
				supported-color-schemes: light dark;
			}

			/* ESTILOS MODO OSCURO */
			@media (prefers-color-scheme: dark) {
				body,
				.wrapper {
					background-color: #1a211b !important; /* Un verde más oscuro que el corporativo */
				}
				.main {
					background-color: #242d26 !important; /* Contenedor sutilmente más claro */
				}
				h1,
				p,
				.h1,
				.footer-text {
					color: #fff5eb !important; /* Texto crema sobre fondo oscuro */
				}
				.button {
					background-color: #d5a18e !important; /* Cambiamos el CTA a color carne para que resalte */
					color: #37443a !important;
				}
				hr {
					border-top: 1px solid #4a5a4d !important;
				}
				.logo-text {
					color: #d5a18e !important;
				}
			}

			/* ESTILOS BASE (LIGHT MODE) */
			body {
				margin: 0;
				padding: 0;
				background-color: #fff5eb;
				font-family: "Questrial", Helvetica, Arial, sans-serif;
			}
			.wrapper {
				width: 100%;
				background-color: #fff5eb;
				padding-bottom: 40px;
			}
			.main {
				background-color: #ffffff;
				margin: 0 auto;
				width: 100%;
				max-width: 600px;
				color: #37443a;
			}
			.button {
				background-color: #37443a;
				color: #fff5eb !important;
				text-decoration: none;
				padding: 15px 30px;
				border-radius: 50px;
				display: inline-block;
				font-weight: bold;
			}
			.h1 {
				font-family: "Georgia", serif;
				font-size: 26px;
			}
		</style>
	</head>
	<body>
		<center class="wrapper">
			<table class="main" role="presentation">
				<tr>
					<td style="padding: 40px 0; text-align: center">
						<h2
							class="logo-text"
							style="margin: 0; letter-spacing: 3px; color: #37443a; font-weight: normal"
						>
							FEMM TRIBU
						</h2>
					</td>
				</tr>
				<tr>
					<td style="padding: 0 40px; text-align: center">
						<h1 class="h1">Confirmación de suscripción a la newsletter</h1>
						<p style="font-size: 16px; line-height: 1.6">
							Estás a un solo clic de recibir calma, ciencia y acompañamiento en tu bandeja de
							entrada.
						</p>
					</td>
				</tr>
				<tr>
					<td style="padding: 30px 0; text-align: center">
						<a href="{{confirmation_url}}" class="button">CONFIRMAR LA NEWSLETTER</a>
					</td>
				</tr>
				<tr>
					<td style="padding: 40px; text-align: center" class="footer-text">
						<p style="font-size: 12px; color: #d5a18e">
							<strong>María Belenguer | Matrona</strong><br />
							Salud integral femenina.
							<br />
							<br />
							<a href="{{unsubscribe_url}}" style="color: #d5a18e; text-decoration: underline"
								>Darme de baja</a
							>| Valencia, España.
						</p>
					</td>
				</tr>
			</table>
		</center>
	</body>
</html>
